<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Poligrid — Audit Logs</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-error": "#fff7f6",
          "on-secondary": "#f3fbf3",
          "primary-fixed-dim": "#c7d9cc",
          "outline-variant": "#adb3b4",
          "surface-container-low": "#f2f4f4",
          "primary-dim": "#46564c",
          "primary": "#526258",
          "primary-container": "#d5e7da",
          "on-primary": "#eafcef",
          "tertiary-container": "#edf8d9",
          "background": "#f9f9f9",
          "on-surface-variant": "#5a6061",
          "on-primary-fixed": "#33433a",
          "surface-variant": "#dde4e5",
          "on-primary-fixed-variant": "#4f5f55",
          "on-tertiary-fixed": "#434d36",
          "on-background": "#2d3435",
          "error-container": "#fe8983",
          "surface": "#f9f9f9",
          "inverse-primary": "#ecfef0",
          "surface-bright": "#f9f9f9",
          "on-error-container": "#752121",
          "tertiary-fixed": "#edf8d9",
          "on-tertiary-fixed-variant": "#5f6a51",
          "inverse-on-surface": "#9c9d9d",
          "surface-dim": "#d4dbdd",
          "inverse-surface": "#0c0f0f",
          "surface-container-high": "#e4e9ea",
          "surface-container": "#ebeeef",
          "secondary-container": "#dde5dd",
          "surface-container-lowest": "#ffffff",
          "primary-fixed": "#d5e7da",
          "surface-tint": "#526258",
          "on-tertiary-container": "#555f47",
          "on-secondary-fixed-variant": "#555d58",
          "error": "#9f403d",
          "secondary-dim": "#4d554f",
          "secondary": "#59615b",
          "error-dim": "#4e0309",
          "on-secondary-fixed": "#39413c",
          "tertiary": "#58634b",
          "tertiary-dim": "#4c563f",
          "tertiary-fixed-dim": "#deeacb",
          "surface-container-highest": "#dde4e5",
          "on-surface": "#2d3435",
          "secondary-fixed": "#dde5dd",
          "on-secondary-container": "#4c544e",
          "outline": "#757c7d",
          "on-tertiary": "#f2fdde",
          "secondary-fixed-dim": "#ced6cf",
          "on-primary-container": "#46554c"
        },
        fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
      },
    },
  }
</script>
<!-- Keep theme.css for inner content component styles -->
<link rel="stylesheet" href="/theme.css" />
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen">

<!-- Sidebar -->
<aside id="appSidebar" class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-surface-container-lowest flex-col z-30 border-r border-outline-variant/10">
  <div class="sidebar-brand px-6 py-6 mb-2 flex items-start justify-between gap-2">
    <div class="sidebar-brand-text min-w-0">
      <span class="text-xs font-bold tracking-[0.2em] text-on-surface-variant/50">POLIGRID STUDIO</span>
      <h1 class="text-xl font-extrabold tracking-tighter text-on-surface mt-1 font-headline">AUDIT LOGS</h1>
    </div>
    <button id="sidebarToggle" class="flex-shrink-0 mt-1 p-1.5 rounded-lg text-on-surface-variant hover:bg-surface-container-low hover:text-on-surface transition-all" title="Toggle sidebar">
      <span class="material-symbols-outlined sidebar-toggle-icon" style="font-size:18px">chevron_left</span>
    </button>
  </div>
  <nav class="flex-1 px-4 space-y-1" id="sidebarNav"></nav>
  <div class="mt-auto border-t border-outline-variant/20 pt-4 px-4 pb-6 space-y-1">
    <a id="settingsLink" href="/profile" class="sidebar-footer-item flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-on-surface rounded-lg hover:bg-surface-container-low transition-colors" data-nav-tip="My Profile">
      <span class="material-symbols-outlined text-[20px]">account_circle</span>
      <span class="nav-label text-xs font-medium">My Profile</span>
    </a>
    <button id="logoutBtn" class="sidebar-footer-item w-full flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-on-surface rounded-lg hover:bg-surface-container-low text-left transition-colors" data-nav-tip="Sign Out">
      <span class="material-symbols-outlined text-[20px]">logout</span>
      <span class="nav-label text-xs font-medium">Sign Out</span>
    </button>
  </div>
</aside>

<!-- Main Content -->
<main id="sidebarMain" class="md:ml-64 min-h-screen">

  <!-- Sticky top bar -->
  <header class="flex justify-between items-center px-8 h-16 bg-surface/80 backdrop-blur-md sticky top-0 z-20 border-b border-outline-variant/10">
    <div class="flex items-center gap-3">
      <span class="font-headline font-extrabold tracking-tighter text-on-background text-base" id="auditTopbarTitle">Audit Logs</span>
    </div>
    <div class="flex items-center gap-4">
      <a id="userAvatarLink" href="/profile">
        <div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant/20">
          <img alt="Profile" class="w-full h-full object-cover" id="userAvatarImg"
            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23e4e9ea'/%3E%3C/svg%3E"/>
        </div>
      </a>
      <button id="logoutBtnTop" class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-container text-on-surface-variant text-xs font-bold uppercase tracking-widest hover:bg-surface-container-high transition-all">
        <span class="material-symbols-outlined text-[14px]">logout</span>Sign out
      </button>
    </div>
  </header>

  <!-- Page Content -->
  <div class="p-8 max-w-7xl mx-auto" id="auditCanvas">

    <!-- ── Hero ──────────────────────────────────────────────────────────── -->
    <div class="proj-detail-hero" style="margin-bottom:28px">
      <nav style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-on-surface-variant);margin-bottom:10px">
        <a href="/homepage" style="color:inherit;text-decoration:none;transition:color 0.15s" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color=''">Home</a>
        <span class="material-symbols-outlined" style="font-size:13px">chevron_right</span>
        <span style="color:var(--color-primary)" id="auditBreadcrumb">Audit Logs</span>
      </nav>
      <div class="proj-detail-title-row" style="flex-wrap:wrap;gap:16px">
        <div>
          <h2 class="proj-detail-name" id="auditTitle" style="font-family:Manrope,sans-serif">Audit Logs</h2>
          <p class="proj-detail-client" id="auditSubline" style="margin-top:4px">Loading audit logs…</p>
        </div>
      </div>
    </div>

    <!-- ── Toolbar ───────────────────────────────────────────────────────── -->
    <div class="dash-toolbar" style="margin-bottom:20px;flex-wrap:wrap">
      <input class="ctx-input" id="searchInput" type="search" placeholder="Search log message, actor, project…" style="max-width:320px" />
      <select class="ctx-input" id="categoryFilter" style="max-width:200px">
        <option value="">All categories</option>
        <option value="design">Design</option>
        <option value="sales">Sales</option>
        <option value="procurement">Procurement</option>
      </select>
      <select class="ctx-input" id="subcategoryFilter" style="max-width:240px">
        <option value="">All subcategories</option>
      </select>
    </div>

    <!-- ── Audit Table ───────────────────────────────────────────────────── -->
    <div class="table-wrap" style="margin-bottom:40px">
      <table class="admin-table" id="auditTable">
        <thead>
          <tr>
            <th>Category</th>
            <th>Subcategory</th>
            <th>Project</th>
            <th>Log Message</th>
            <th>Actioned By</th>
            <th>Actioned On</th>
          </tr>
        </thead>
        <tbody id="auditBody">
          <tr><td colspan="6" class="loading-hint" style="text-align:center;padding:32px 16px">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div><!-- /page content -->
</main>

<!-- Mobile Bottom Nav -->
<nav class="md:hidden fixed bottom-0 w-full bg-surface/80 backdrop-blur-xl flex justify-around items-center py-3 border-t border-surface-container z-20" id="mobileNav"></nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/client/auth.js"></script>
<script src="/client/nav.js"></script>
<script src="/client/audit.js"></script>
</body>
</html>
