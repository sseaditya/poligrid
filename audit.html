<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poligrid — Audit Logs</title>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body class="dash-body">

  <header class="top-bar">
    <div class="top-bar-left">
      <a href="/homepage" class="logo-link"><span class="logo-text">Poligrid</span></a>
      <span class="page-title">Audit Logs</span>
    </div>
    <nav class="dash-nav" id="dashNav"></nav>
    <div class="top-bar-right" id="userChipWrap"></div>
  </header>

  <main class="dash-main">
    <div class="dash-hero" style="display:flex;justify-content:space-between;align-items:flex-end;gap:12px;flex-wrap:wrap">
      <div>
        <h1 class="dash-greeting" id="auditTitle">Audit Logs</h1>
        <p class="dash-subline" id="auditSubline">Loading audit logs…</p>
      </div>
      <a class="ghost-btn btn-sm" id="projectAuditBack" href="/projects" hidden>Back to Project</a>
    </div>

    <div class="dash-toolbar" style="flex-wrap:wrap">
      <input class="ctx-input" id="searchInput" type="search" placeholder="Search log message, actor, project…" style="max-width:320px" />
      <select class="ctx-input" id="categoryFilter" style="max-width:200px">
        <option value="">All categories</option>
        <option value="design">Design</option>
        <option value="sales">Sales</option>
        <option value="procurement">Procurement</option>
      </select>
      <select class="ctx-input" id="subcategoryFilter" style="max-width:240px">
        <option value="">All subcategories</option>
      </select>
    </div>

    <div class="table-wrap">
      <table class="admin-table" id="auditTable">
        <thead>
          <tr>
            <th>Category</th>
            <th>Subcategory</th>
            <th>Project</th>
            <th>Log Message</th>
            <th>Actioned By</th>
            <th>Actioned On</th>
          </tr>
        </thead>
        <tbody id="auditBody">
          <tr><td colspan="6" class="loading-hint">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="client/auth.js"></script>
  <script src="client/audit.js"></script>
</body>
</html>
