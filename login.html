<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poligrid — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-body">
  <div class="noise"></div>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="logo-text">Poligrid</span>
        <span class="logo-sub">Interior Design Platform</span>
      </div>

      <div class="auth-error" id="authError" hidden></div>

      <button class="google-btn" id="googleBtn">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="auth-footer-note">Access is by invitation only. Contact your administrator.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="client/auth.js"></script>
  <script>
    // Show rejection reason if bounced back from auth check
    const _params = new URLSearchParams(location.search);
    const _reason = _params.get("reason") || (_params.get("blocked") ? "account_inactive" : null);
    if (_reason) {
      const _messages = {
        not_invited:      "Your email hasn't been added to Poligrid. Contact your administrator to get an invite.",
        account_inactive: "Your account has been deactivated. Contact your administrator.",
        error:            "Sign-in failed. Contact your administrator.",
      };
      const el = document.getElementById("authError");
      el.textContent = _messages[_reason] || _messages["error"];
      el.hidden = false;
    }

    // If already signed in, skip the login page
    AuthClient.getSession().then(session => {
      if (session) window.location.href = "/homepage.html";
    }).catch(err => {
      const el = document.getElementById("authError");
      el.textContent = err.message || "Configuration error. Contact your administrator.";
      el.hidden = false;
      document.getElementById("googleBtn").disabled = true;
    });

    const btn   = document.getElementById("googleBtn");
    const errEl = document.getElementById("authError");

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      btn.textContent = "Redirecting…";
      const { error } = await AuthClient.signInWithGoogle();
      if (error) {
        errEl.textContent = error.message || "Could not start Google sign-in.";
        errEl.hidden = false;
        btn.disabled = false;
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Continue with Google`;
      }
      // On success, Supabase redirects to Google — no further action needed here
    });
  </script>
</body>
</html>
