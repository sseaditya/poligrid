<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poligrid — Project</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-error": "#fff7f6", "on-secondary": "#f3fbf3",
            "primary-fixed-dim": "#c7d9cc", "outline-variant": "#adb3b4",
            "surface-container-low": "#f2f4f4", "primary-dim": "#46564c",
            "primary": "#526258", "primary-container": "#d5e7da",
            "on-primary": "#eafcef", "tertiary-container": "#edf8d9",
            "background": "#f9f9f9", "on-surface-variant": "#5a6061",
            "on-primary-fixed": "#33433a", "surface-variant": "#dde4e5",
            "on-primary-fixed-variant": "#4f5f55", "on-tertiary-fixed": "#434d36",
            "on-background": "#2d3435", "error-container": "#fe8983",
            "surface": "#f9f9f9", "inverse-primary": "#ecfef0",
            "surface-bright": "#f9f9f9", "on-error-container": "#752121",
            "tertiary-fixed": "#edf8d9", "on-tertiary-fixed-variant": "#5f6a51",
            "inverse-on-surface": "#9c9d9d", "surface-dim": "#d4dbdd",
            "inverse-surface": "#0c0f0f", "surface-container-high": "#e4e9ea",
            "surface-container": "#ebeeef", "secondary-container": "#dde5dd",
            "surface-container-lowest": "#ffffff", "primary-fixed": "#d5e7da",
            "surface-tint": "#526258", "on-tertiary-container": "#555f47",
            "on-secondary-fixed-variant": "#555d58", "error": "#9f403d",
            "secondary-dim": "#4d554f", "secondary": "#59615b",
            "error-dim": "#4e0309", "on-secondary-fixed": "#39413c",
            "tertiary": "#58634b", "tertiary-dim": "#4c563f",
            "tertiary-fixed-dim": "#deeacb", "surface-container-highest": "#dde4e5",
            "on-surface": "#2d3435", "secondary-fixed": "#dde5dd",
            "on-secondary-container": "#4c544e", "outline": "#757c7d",
            "on-tertiary": "#f2fdde", "secondary-fixed-dim": "#ced6cf",
            "on-primary-container": "#46554c"
          },
          fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <!-- Keep theme.css for inner content component styles (badges, sections, etc.) -->
  <link rel="stylesheet" href="/theme.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    /* Workspace inner layout and workspace card styles come from theme.css */
  </style>
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen">

<!-- ── Global Left Sidebar (matches projects.html / audit.html) ─────────────── -->
<aside class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-surface-container-lowest flex-col py-6 px-4 z-30 border-r border-outline-variant/10">
  <div class="px-4 mb-8">
    <span class="text-xs font-bold tracking-[0.2em] text-on-surface-variant/50">POLIGRID STUDIO</span>
    <h1 class="text-xl font-extrabold tracking-tighter text-on-surface mt-1 font-headline">GOD'S EYE</h1>
  </div>
  <nav class="flex-1 space-y-1" id="sidebarNav">
    <!-- Rendered by nav.js -->
  </nav>
  <div class="mt-auto border-t border-outline-variant/20 pt-4 space-y-1">
    <a id="settingsLink" href="/profile" class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-on-surface transition-colors rounded-lg hover:bg-surface-container-low">
      <span class="material-symbols-outlined text-[20px]">account_circle</span>
      <span class="text-xs font-medium">My Profile</span>
    </a>
    <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-on-surface transition-colors rounded-lg hover:bg-surface-container-low text-left">
      <span class="material-symbols-outlined text-[20px]">logout</span>
      <span class="text-xs font-medium">Sign Out</span>
    </button>
  </div>
</aside>

<!-- ── Main content area ─────────────────────────────────────────────────────── -->
<div class="md:ml-64 flex flex-col min-h-screen">

  <!-- Sticky top bar -->
  <header class="flex justify-between items-center px-8 h-16 w-full bg-surface/80 backdrop-blur-md sticky top-0 z-20 border-b border-outline-variant/10">
    <div class="flex items-center gap-3" id="topBarTitle">
      <span class="font-headline font-extrabold tracking-tighter text-on-background text-base">Project</span>
    </div>
    <div class="flex items-center gap-4">
      <a id="topbarProfileLink" href="/profile">
        <div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant/20">
          <img alt="Profile" class="w-full h-full object-cover" id="userAvatarImg"
            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23e4e9ea'/%3E%3C/svg%3E"/>
        </div>
      </a>
      <button id="logoutBtnTop" class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-container text-on-surface-variant text-xs font-bold uppercase tracking-widest hover:bg-surface-container-high transition-all">
        <span class="material-symbols-outlined text-[14px]">logout</span>Sign out
      </button>
    </div>
  </header>

  <!-- Project canvas -->
  <div class="p-8 max-w-7xl mx-auto min-h-screen" id="projectMain">
    <p class="loading-hint">Loading project…</p>
  </div>
</div>

<!-- ── Mobile Bottom Nav ──────────────────────────────────────────────────────── -->
<nav class="md:hidden fixed bottom-0 w-full bg-surface/80 backdrop-blur-xl flex justify-around items-center py-3 border-t border-surface-container z-20" id="mobileNav">
  <!-- Rendered by JS -->
</nav>

<!-- ── Edit Details Modal ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="editModal" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <h2 class="modal-title">Edit Project Details</h2>
      <button class="ghost-sm" id="editModalClose">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">Project name
        <input class="ctx-input" id="editName" type="text" />
      </label>
      <label class="field-label">Client name
        <input class="ctx-input" id="editClient" type="text" />
      </label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <label class="field-label">Property type
          <input class="ctx-input" id="editPropertyType" type="text" placeholder="e.g. Apartment" />
        </label>
        <label class="field-label">BHK
          <input class="ctx-input" id="editBhk" type="text" placeholder="e.g. 3BHK" />
        </label>
        <label class="field-label">Configuration
          <input class="ctx-input" id="editBhkType" type="text" placeholder="e.g. 3+2" />
        </label>
        <label class="field-label">Area (m²)
          <input class="ctx-input" id="editArea" type="number" min="0" step="0.1" />
        </label>
      </div>
      <label class="field-label">Design Brief
        <textarea class="ctx-input" id="editBrief" rows="4" style="resize:vertical"></textarea>
      </label>
      <div class="auth-error" id="editError" hidden></div>
      <div class="modal-footer">
        <button class="ghost-btn" id="editCancel">Cancel</button>
        <button class="primary-btn" id="editSave">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Drawing Review Modal ────────────────────────────────────────────────── -->
<div class="modal-overlay" id="reviewModal" hidden>
  <div class="modal-card">
    <div class="modal-header">
      <h2 class="modal-title">Review Drawing</h2>
      <button class="ghost-sm" id="reviewModalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="review-drawing-name" id="reviewDrawingTitle">—</div>
      <label class="field-label">Comments / Feedback
        <textarea class="ctx-input" id="reviewComments" rows="4"
          placeholder="Optional notes for the designer…" style="resize:vertical"></textarea>
      </label>
      <div class="auth-error" id="reviewError" hidden></div>
      <div class="modal-footer review-actions">
        <div style="display:flex;gap:8px">
          <button class="ghost-btn btn-sm danger-btn" id="reviewRejectBtn">Reject</button>
          <button class="ghost-btn btn-sm" id="reviewRevisionBtn">Request Revision</button>
        </div>
        <button class="primary-btn btn-sm" id="reviewApproveBtn" style="width:auto">
          <span class="material-symbols-outlined" style="font-size:15px">check</span>
          Approve
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Assign Designer Modal ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="assignDesignerModal" hidden>
  <div class="modal-card" style="max-width:560px;width:100%">
    <div class="modal-header">
      <h2 class="modal-title">Assign Designer</h2>
      <button class="ghost-sm" id="assignDesignerModalClose">✕</button>
    </div>
    <div class="modal-body" style="gap:16px">
      <label class="field-label">Designer
        <select class="ctx-input" id="modalDesignerSelect">
          <option value="">Loading…</option>
        </select>
      </label>
      <div id="designerTeamNote" hidden
        style="font-size:12px;padding:8px 12px;border-radius:6px;margin-top:-8px"></div>

      <div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
            color:var(--color-on-surface-variant);margin:0">Drawing Assignments</p>
          <button class="ghost-sm" id="modalAddDrawingRowBtn" type="button">+ Add Type</button>
        </div>
        <div id="modalDrawingRows" style="display:flex;flex-direction:column;gap:8px"></div>
        <p id="modalNoRowsHint" style="font-size:12px;color:var(--color-on-surface-variant)">
          Add at least one drawing type to assign.</p>
      </div>

      <label class="field-label">Notes (optional)
        <input class="ctx-input" id="modalAssignNotes" type="text"
          placeholder="Special instructions for the designer…" />
      </label>

      <div class="auth-error" id="assignDesignerError" hidden></div>
      <div class="modal-footer">
        <button class="ghost-btn" id="assignDesignerCancelBtn">Cancel</button>
        <button class="primary-btn" id="assignDesignerConfirmBtn" style="gap:6px;width:auto">
          <span class="material-symbols-outlined" style="font-size:15px">person_add</span>
          Assign Designer
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── Drawing Viewer Modal ───────────────────────────────────────────────────── -->
<div id="drawingViewerModal"
  style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);
         flex-direction:column">
  <div style="display:flex;align-items:center;justify-content:space-between;
               padding:12px 20px;flex-shrink:0;background:rgba(0,0,0,0.6);border-bottom:1px solid rgba(255,255,255,0.08)">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="material-symbols-outlined" style="font-size:18px;color:#a0aec0">architecture</span>
      <span id="drawingViewerTitle" style="font-size:14px;font-weight:600;color:#e2e8f0;letter-spacing:.01em">Drawing</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <a id="drawingViewerDlBtn"
        style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
               padding:6px 14px;border-radius:7px;border:1px solid rgba(255,255,255,0.18);
               color:#e2e8f0;background:rgba(255,255,255,0.07);cursor:pointer;text-decoration:none;
               transition:background .15s">
        <span class="material-symbols-outlined" style="font-size:15px">download</span> Download
      </a>
      <button id="drawingViewerClose"
        style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;
               border-radius:7px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);
               color:#e2e8f0;cursor:pointer;font-size:18px;line-height:1">✕</button>
    </div>
  </div>
  <div style="flex:1;overflow:hidden;position:relative">
    <!-- PDF/image embed -->
    <iframe id="drawingViewerIframe"
      style="width:100%;height:100%;border:none;background:#fff"
      src="about:blank"></iframe>
    <!-- fallback for non-PDF (images) -->
    <img id="drawingViewerImg" src=""
      style="display:none;width:100%;height:100%;object-fit:contain;padding:24px;box-sizing:border-box" />
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/client/auth.js"></script>
<script src="/client/nav.js"></script>
<script src="/client/project-detail.js"></script>
</body>
</html>
