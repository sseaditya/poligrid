<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poligrid — Project</title>
  <link rel="stylesheet" href="/theme.css" />
</head>
<body class="dash-body">

  <header class="top-bar">
    <div class="top-bar-left">
      <a href="/homepage" class="logo-link"><span class="logo-text">Poligrid</span></a>
      <a href="/projects" class="page-title-link">← Projects</a>
    </div>
    <nav class="dash-nav" id="dashNav"></nav>
    <div class="top-bar-right" id="userChipWrap"></div>
  </header>

  <main class="dash-main" id="projectMain">
    <p class="loading-hint">Loading project…</p>
  </main>

  <!-- Edit details modal -->
  <div class="modal-overlay" id="editModal" hidden>
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">Edit Project Details</h2>
        <button class="ghost-sm" id="editModalClose">✕</button>
      </div>
      <div class="modal-body">
        <label class="field-label">Project name
          <input class="ctx-input" id="editName" type="text" />
        </label>
        <label class="field-label">Client name
          <input class="ctx-input" id="editClient" type="text" />
        </label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <label class="field-label">Property type
            <input class="ctx-input" id="editPropertyType" type="text" placeholder="e.g. Apartment" />
          </label>
          <label class="field-label">BHK
            <input class="ctx-input" id="editBhk" type="text" placeholder="e.g. 3BHK" />
          </label>
          <label class="field-label">Configuration
            <input class="ctx-input" id="editBhkType" type="text" placeholder="e.g. 3+2" />
          </label>
          <label class="field-label">Area (m²)
            <input class="ctx-input" id="editArea" type="number" min="0" step="0.1" />
          </label>
        </div>
        <label class="field-label">Design Brief
          <textarea class="ctx-input" id="editBrief" rows="4" style="resize:vertical"></textarea>
        </label>
        <div class="auth-error" id="editError" hidden></div>
        <div class="modal-footer">
          <button class="ghost-btn" id="editCancel">Cancel</button>
          <button class="primary-btn" id="editSave">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="client/auth.js"></script>
  <script src="client/project-detail.js"></script>
</body>
</html>
