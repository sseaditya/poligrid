<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Poligrid — Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-error": "#fff7f6",
          "on-secondary": "#f3fbf3",
          "primary-fixed-dim": "#c7d9cc",
          "outline-variant": "#adb3b4",
          "surface-container-low": "#f2f4f4",
          "primary-dim": "#46564c",
          "primary": "#526258",
          "primary-container": "#d5e7da",
          "on-primary": "#eafcef",
          "tertiary-container": "#edf8d9",
          "background": "#f9f9f9",
          "on-surface-variant": "#5a6061",
          "on-primary-fixed": "#33433a",
          "surface-variant": "#dde4e5",
          "on-primary-fixed-variant": "#4f5f55",
          "on-tertiary-fixed": "#434d36",
          "on-background": "#2d3435",
          "error-container": "#fe8983",
          "surface": "#f9f9f9",
          "inverse-primary": "#ecfef0",
          "surface-bright": "#f9f9f9",
          "on-error-container": "#752121",
          "tertiary-fixed": "#edf8d9",
          "on-tertiary-fixed-variant": "#5f6a51",
          "inverse-on-surface": "#9c9d9d",
          "surface-dim": "#d4dbdd",
          "inverse-surface": "#0c0f0f",
          "surface-container-high": "#e4e9ea",
          "surface-container": "#ebeeef",
          "secondary-container": "#dde5dd",
          "surface-container-lowest": "#ffffff",
          "primary-fixed": "#d5e7da",
          "surface-tint": "#526258",
          "on-tertiary-container": "#555f47",
          "on-secondary-fixed-variant": "#555d58",
          "error": "#9f403d",
          "secondary-dim": "#4d554f",
          "secondary": "#59615b",
          "error-dim": "#4e0309",
          "on-secondary-fixed": "#39413c",
          "tertiary": "#58634b",
          "tertiary-dim": "#4c563f",
          "tertiary-fixed-dim": "#deeacb",
          "surface-container-highest": "#dde4e5",
          "on-surface": "#2d3435",
          "secondary-fixed": "#dde5dd",
          "on-secondary-container": "#4c544e",
          "outline": "#757c7d",
          "on-tertiary": "#f2fdde",
          "secondary-fixed-dim": "#ced6cf",
          "on-primary-container": "#46554c"
        },
        fontFamily: { "headline": ["Manrope"], "body": ["Inter"], "label": ["Inter"] },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
      },
    },
  }
</script>
<!-- Keep theme.css for inner content component styles -->
<link rel="stylesheet" href="/theme.css" />
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  /* ── Project Assignments Matrix table ───────────────────────── */
  .pa-table { width: 100%; border-collapse: collapse; min-width: 860px; }
  .pa-table thead tr { background: var(--color-surface-container-low); }
  .pa-table th {
    padding: 10px 14px; text-align: left;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--color-on-surface-variant);
    border-bottom: 1px solid var(--color-outline-variant);
    white-space: nowrap;
  }
  .pa-table th.pa-th-project { min-width: 180px; }
  .pa-table th.pa-th-role    { min-width: 160px; }
  .pa-table th.pa-th-future  { opacity: 0.45; }
  .pa-table tbody tr { border-bottom: 1px solid var(--color-outline-variant); transition: background 0.12s; }
  .pa-table tbody tr:hover   { background: var(--color-surface-container-low); }
  .pa-table td { padding: 10px 14px; vertical-align: top; }
  .pa-project-name {
    font-size: 13px; font-weight: 700; color: var(--color-on-surface);
    text-decoration: none; display: block;
  }
  .pa-project-name:hover { color: var(--color-primary); }
  .pa-project-client { font-size: 11px; color: var(--color-on-surface-variant); margin-top: 1px; display: block; }

  /* Role cell */
  .pa-cell { display: flex; flex-direction: column; gap: 4px; min-height: 28px; }

  /* Member tag */
  .pa-tag {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 6px 3px 4px; border-radius: 99px;
    border: 1px solid transparent; font-size: 11px; font-weight: 600;
    white-space: nowrap; max-width: 180px;
  }
  .pa-tag-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 110px; }
  .pa-tag-remove {
    background: none; border: none; cursor: pointer; padding: 0; line-height: 1;
    font-size: 13px; opacity: 0.55; margin-left: 1px; flex-shrink: 0;
    transition: opacity 0.12s;
  }
  .pa-tag-remove:hover { opacity: 1; }

  /* Add button + dropdown */
  .pa-add-wrap { position: relative; display: inline-block; }
  .pa-add-btn {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 2px 8px; border-radius: 99px; border: 1px dashed var(--color-outline-variant);
    background: none; cursor: pointer; color: var(--color-on-surface-variant);
    transition: all 0.12s;
  }
  .pa-add-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: rgba(82,98,88,0.05); }
  .pa-dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; z-index: 50;
    background: var(--color-surface-container-lowest);
    border: 1px solid var(--color-outline-variant);
    border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    min-width: 180px; overflow: hidden;
  }
  .pa-dropdown.hidden { display: none; }
  .pa-dropdown-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    color: var(--color-on-surface); transition: background 0.1s;
  }
  .pa-dropdown-item:hover { background: var(--color-surface-container-low); }
  .pa-dropdown-empty {
    padding: 10px 12px; font-size: 11px; color: var(--color-on-surface-variant); font-style: italic;
  }
  .pa-future-label {
    font-size: 10px; font-weight: 600; color: var(--color-on-surface-variant);
    opacity: 0.5; font-style: italic;
  }

  /* Role badge — read mode for team table */
  .role-badge {
    display: inline-flex; align-items: center;
    padding: 3px 9px; border-radius: 99px;
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .role-badge.role-sales         { background: #dbeafe; color: #1d4ed8; }
  .role-badge.role-designer      { background: #ede9fe; color: #7c3aed; }
  .role-badge.role-lead_designer { background: #fef3c7; color: #92400e; }
  .role-badge.role-admin         { background: var(--color-primary-container); color: var(--color-primary); }
  .role-badge.role-ceo           { background: #f1f5f9; color: #334155; }
</style>
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen">

<!-- Main Content -->
<main id="sidebarMain" class="md:ml-64 min-h-screen">

  <!-- Sticky top bar -->
  <header class="flex justify-end items-center px-8 h-16 bg-surface/80 backdrop-blur-md sticky top-0 z-20 border-b border-outline-variant/10">
    <div class="flex items-center gap-4">
      <button class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all primary-btn btn-sm" id="toggleInviteBtn" style="width:auto;gap:5px">
        <span class="material-symbols-outlined text-[15px]">person_add</span>Add Member
      </button>
    </div>
  </header>

  <!-- Page Content -->
  <div class="p-8 max-w-7xl mx-auto" id="adminCanvas">

    <!-- ── Hero ──────────────────────────────────────────────────────────── -->
    <div class="proj-detail-hero" style="margin-bottom:28px">
      <nav style="display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-on-surface-variant);margin-bottom:10px">
        <a href="/admin_home" style="color:inherit;text-decoration:none;transition:color 0.15s" onmouseover="this.style.color='var(--color-primary)'" onmouseout="this.style.color=''">Home</a>
        <span class="material-symbols-outlined" style="font-size:13px">chevron_right</span>
        <span style="color:var(--color-primary)">Team Directory</span>
      </nav>
      <div class="proj-detail-title-row">
        <div>
          <h2 class="proj-detail-name" style="font-family:Manrope,sans-serif">Team Directory</h2>
          <p class="proj-detail-client" style="margin-top:4px;display:flex;align-items:center;gap:4px">
            <span class="material-symbols-outlined" style="font-size:14px">business</span>
            Organization &rsaquo; All Employees
          </p>
        </div>
      </div>
    </div>

    <!-- ── Invite panel ──────────────────────────────────────────────────── -->
    <div class="dash-section" id="invitePanel" hidden style="margin-bottom:20px;gap:14px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="dash-section-icon">
          <span class="material-symbols-outlined">person_add</span>
          <h2 class="dash-section-title">Invite New Member</h2>
        </div>
        <button class="ghost-sm" id="closeInviteBtn">✕</button>
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
        <label class="field-label" style="flex:2;min-width:200px;max-width:300px">Email Address
          <input type="email" class="ctx-input" id="inviteEmail" placeholder="name@example.com" />
        </label>
        <label class="field-label" style="flex:1.5;min-width:160px;max-width:220px">Full Name <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span>
          <input type="text" class="ctx-input" id="inviteFullName" placeholder="Jane Smith" />
        </label>
        <label class="field-label" style="flex:1;min-width:140px;max-width:170px">Role
          <select class="ctx-input" id="inviteRole">
            <option value="sales">Sales</option>
            <option value="designer">Designer</option>
            <option value="lead_designer">Lead Designer</option>
            <option value="admin">Admin</option>
            <option value="ceo">CEO</option>
          </select>
        </label>
        <button class="primary-btn btn-sm" id="inviteBtn" style="align-self:flex-end;width:auto">Send Invite</button>
      </div>
      <div class="adm-invite-msg" id="inviteMsg"></div>
      <div id="invitationsWrap"></div>
    </div>

    <!-- ── Filter toolbar ────────────────────────────────────────────────── -->
    <div class="dash-toolbar" style="margin-bottom:12px">
      <input class="ctx-input" id="memberSearchInput" type="search" placeholder="Search team members…" style="max-width:280px" />
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
        <button class="primary-btn btn-sm" id="teamSaveBtn" style="display:none;width:auto">Save Changes</button>
        <button class="ghost-sm" id="teamCancelBtn" style="display:none">Cancel</button>
        <button class="ghost-sm" id="teamEditBtn">
          <span class="material-symbols-outlined" style="font-size:15px">edit</span> Edit
        </button>
        <button class="ghost-sm" title="Filter">
          <span class="material-symbols-outlined" style="font-size:15px">filter_list</span>
        </button>
        <button class="ghost-sm" title="Export">
          <span class="material-symbols-outlined" style="font-size:15px">download</span>
        </button>
      </div>
    </div>

    <!-- ── Team table ─────────────────────────────────────────────────────── -->
    <div class="table-wrap" style="margin-bottom:24px">
      <table class="admin-table" id="usersTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Access Level</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="4" class="loading-hint" style="text-align:center;padding:32px 16px">Loading team…</td></tr>
        </tbody>
      </table>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--color-surface-container-low);border-top:1px solid var(--color-outline-variant);font-size:12px;color:var(--color-on-surface-variant)">
        <span id="memberCountLabel">Loading…</span>
        <div style="display:flex;gap:8px">
          <button class="ghost-sm">Previous</button>
          <button class="ghost-sm">Next</button>
        </div>
      </div>
    </div>

    <!-- ── Project Assignments Matrix ──────────────────────────────────────── -->
    <div class="dash-section" style="gap:0;padding:0;overflow:hidden;margin-bottom:40px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--color-outline-variant)">
        <div class="dash-section-icon">
          <span class="material-symbols-outlined">folder_shared</span>
          <h2 class="dash-section-title">Project Assignments</h2>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <p class="dash-section-hint" id="assignHint" style="margin:0">Click Edit to assign or remove team members per role</p>
          <button class="primary-btn btn-sm" id="assignSaveBtn" style="display:none;width:auto">Save Changes</button>
          <button class="ghost-sm" id="assignCancelBtn" style="display:none">Cancel</button>
          <button class="ghost-sm" id="assignEditBtn">
            <span class="material-symbols-outlined" style="font-size:15px">edit</span> Edit
          </button>
        </div>
      </div>
      <div id="assignmentsTableWrap" style="overflow-x:auto">
        <div style="padding:32px;text-align:center;color:var(--color-on-surface-variant);font-size:13px">Loading projects…</div>
      </div>
    </div>

  </div><!-- /page content -->
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/client/auth.js"></script>
<script src="/client/nav.js"></script>
<script src="/client/studio-utils.js"></script>
<script src="/client/admin.js"></script>
<script>
  // Invite panel toggle (wired from topbar button + inline close button)
  const invitePanel = document.getElementById("invitePanel");
  const toggleBtn   = document.getElementById("toggleInviteBtn");
  const closeBtn    = document.getElementById("closeInviteBtn");

  toggleBtn.addEventListener("click", () => {
    invitePanel.hidden = !invitePanel.hidden;
    if (!invitePanel.hidden) invitePanel.scrollIntoView({ behavior: "smooth", block: "nearest" });
  });
  closeBtn.addEventListener("click", () => { invitePanel.hidden = true; });
</script>
</body>
</html>
