<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Poligrid — Projects</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "on-error": "#fff7f6",
          "on-secondary": "#f3fbf3",
          "primary-fixed-dim": "#c7d9cc",
          "outline-variant": "#adb3b4",
          "surface-container-low": "#f2f4f4",
          "primary-dim": "#46564c",
          "primary": "#526258",
          "primary-container": "#d5e7da",
          "on-primary": "#eafcef",
          "tertiary-container": "#edf8d9",
          "background": "#f9f9f9",
          "on-surface-variant": "#5a6061",
          "on-primary-fixed": "#33433a",
          "surface-variant": "#dde4e5",
          "on-primary-fixed-variant": "#4f5f55",
          "on-tertiary-fixed": "#434d36",
          "on-background": "#2d3435",
          "error-container": "#fe8983",
          "surface": "#f9f9f9",
          "inverse-primary": "#ecfef0",
          "surface-bright": "#f9f9f9",
          "on-error-container": "#752121",
          "tertiary-fixed": "#edf8d9",
          "on-tertiary-fixed-variant": "#5f6a51",
          "inverse-on-surface": "#9c9d9d",
          "surface-dim": "#d4dbdd",
          "inverse-surface": "#0c0f0f",
          "surface-container-high": "#e4e9ea",
          "surface-container": "#ebeeef",
          "secondary-container": "#dde5dd",
          "surface-container-lowest": "#ffffff",
          "primary-fixed": "#d5e7da",
          "surface-tint": "#526258",
          "on-tertiary-container": "#555f47",
          "on-secondary-fixed-variant": "#555d58",
          "error": "#9f403d",
          "secondary-dim": "#4d554f",
          "secondary": "#59615b",
          "error-dim": "#4e0309",
          "on-secondary-fixed": "#39413c",
          "tertiary": "#58634b",
          "tertiary-dim": "#4c563f",
          "tertiary-fixed-dim": "#deeacb",
          "surface-container-highest": "#dde4e5",
          "on-surface": "#2d3435",
          "secondary-fixed": "#dde5dd",
          "on-secondary-container": "#4c544e",
          "outline": "#757c7d",
          "on-tertiary": "#f2fdde",
          "secondary-fixed-dim": "#ced6cf",
          "on-primary-container": "#46554c"
        },
        fontFamily: {
          "headline": ["Manrope"],
          "body": ["Inter"],
          "label": ["Inter"]
        },
        borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
      },
    },
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  h1, h2, h3, .headline { font-family: 'Manrope', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .primary-gradient { background: linear-gradient(135deg, #526258 0%, #46564c 100%); }
  .skeleton { background: linear-gradient(90deg, #e4e9ea 25%, #f2f4f4 50%, #e4e9ea 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .drawing-bar-track { height: 3px; background: #e4e9ea; border-radius: 2px; overflow: hidden; display: flex; }
  .drawing-bar-approved { background: #526258; }
  .drawing-bar-review   { background: #a8c5b0; }
  .proj-row-click { cursor: pointer; }
</style>
</head>
<body class="bg-background text-on-background font-body antialiased min-h-screen">

<!-- Sidebar -->
<aside class="hidden md:flex h-screen w-64 fixed left-0 top-0 bg-surface-container-lowest flex-col py-6 px-4 z-30 border-r border-outline-variant/10">
  <div class="px-4 mb-8">
    <span class="text-xs font-bold tracking-[0.2em] text-on-surface-variant/50">POLIGRID STUDIO</span>
    <h1 class="text-xl font-extrabold tracking-tighter text-on-surface mt-1 font-headline">GOD'S EYE</h1>
  </div>
  <nav class="flex-1 space-y-1" id="sidebarNav">
    <!-- Rendered by JS -->
  </nav>
  <div class="mt-auto border-t border-outline-variant/20 pt-4 space-y-1">
    <a href="/profile" class="flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-on-surface transition-colors rounded-lg hover:bg-surface-container-low">
      <span class="material-symbols-outlined text-[20px]">settings</span>
      <span class="text-xs font-medium">Settings</span>
    </a>
    <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-2 text-on-surface-variant hover:text-on-surface transition-colors rounded-lg hover:bg-surface-container-low text-left">
      <span class="material-symbols-outlined text-[20px]">logout</span>
      <span class="text-xs font-medium">Sign Out</span>
    </button>
  </div>
</aside>

<!-- Main Content -->
<main class="md:ml-64 min-h-screen">

  <!-- Top Bar -->
  <header class="flex justify-between items-center px-8 h-16 w-full bg-surface/80 backdrop-blur-md sticky top-0 z-20 border-b border-outline-variant/10">
    <div class="flex items-center gap-3">
      <span class="font-headline font-extrabold tracking-tighter text-on-background text-base">Projects</span>
      <span id="projectCount" class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant bg-surface-container px-2.5 py-1 rounded-full hidden"></span>
    </div>
    <div class="flex items-center gap-4">
      <button id="newProjectBtn" hidden
        class="flex items-center gap-2 px-4 py-2 rounded-lg primary-gradient text-on-primary text-xs font-bold uppercase tracking-widest hover:opacity-90 transition-all">
        <span class="material-symbols-outlined text-[15px]">add</span>New Project
      </button>
      <a href="/profile">
        <div class="w-8 h-8 rounded-full bg-surface-container-high overflow-hidden border border-outline-variant/20">
          <img alt="Profile" class="w-full h-full object-cover" id="userAvatarImg"
            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23e4e9ea'/%3E%3C/svg%3E"/>
        </div>
      </a>
      <button id="logoutBtnTop" class="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-container text-on-surface-variant text-xs font-bold uppercase tracking-widest hover:bg-surface-container-high transition-all">
        <span class="material-symbols-outlined text-[14px]">logout</span>Sign out
      </button>
    </div>
  </header>

  <!-- Page Content -->
  <div class="p-8 max-w-7xl mx-auto space-y-6">

    <!-- Toolbar -->
    <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
      <div class="relative flex-1 max-w-sm">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">search</span>
        <input id="searchInput" type="text" placeholder="Search by name or client…"
          class="w-full bg-surface-container-lowest border border-outline-variant/20 rounded-xl py-2.5 pl-10 pr-4 text-sm focus:ring-1 focus:ring-primary outline-none"/>
      </div>
      <select id="statusFilter"
        class="bg-surface-container-lowest border border-outline-variant/20 rounded-xl py-2.5 px-4 text-sm text-on-surface-variant focus:ring-1 focus:ring-primary outline-none">
        <option value="">All statuses</option>
        <option value="active">Active</option>
        <option value="advanced_paid">Advance Paid</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="on_hold">On Hold</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <!-- Project Table -->
    <div id="projectsTable">
      <!-- Skeletons -->
      <div class="bg-surface-container-lowest rounded-xl overflow-hidden">
        <div class="space-y-0">
          <div class="skeleton h-14 rounded-none border-b border-outline-variant/10 mx-0"></div>
          <div class="skeleton h-14 rounded-none border-b border-outline-variant/10"></div>
          <div class="skeleton h-14 rounded-none border-b border-outline-variant/10"></div>
          <div class="skeleton h-14 rounded-none border-b border-outline-variant/10"></div>
          <div class="skeleton h-14 rounded-none"></div>
        </div>
      </div>
    </div>

  </div><!-- /max-w-7xl -->
</main>

<!-- Mobile Bottom Nav -->
<nav class="md:hidden fixed bottom-0 w-full bg-surface/80 backdrop-blur-xl flex justify-around items-center py-3 border-t border-surface-container z-20" id="mobileNav">
  <!-- Rendered by JS -->
</nav>

<!-- Create Project Modal -->
<div id="createProjectModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:24px">
  <div style="background:#fff;border-radius:16px;max-width:480px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.15)">
    <div style="padding:24px 24px 0;display:flex;justify-content:space-between;align-items:center">
      <h2 style="font-family:Manrope;font-weight:800;font-size:20px;color:#2d3435;margin:0">New Project</h2>
      <button id="createProjectClose" style="background:none;border:none;cursor:pointer;font-size:20px;color:#5a6061;padding:4px;line-height:1">✕</button>
    </div>
    <div style="padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px">
      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#2d3435">
        Project name <span style="color:#9f403d">*</span>
        <input id="newProjectName" type="text" placeholder="e.g. Sharma Residence"
          style="padding:10px 14px;border:none;background:#f2f4f4;border-radius:8px;font-size:14px;outline:none;font-family:Inter"/>
      </label>
      <label style="display:flex;flex-direction:column;gap:6px;font-size:13px;font-weight:600;color:#2d3435">
        Client name <span style="color:#757c7d;font-weight:400">(optional)</span>
        <input id="newProjectClient" type="text" placeholder="e.g. Rajesh Sharma"
          style="padding:10px 14px;border:none;background:#f2f4f4;border-radius:8px;font-size:14px;outline:none;font-family:Inter"/>
      </label>
      <div id="createProjectError" style="display:none;color:#9f403d;font-size:13px;padding:10px 14px;background:#fff0f0;border-radius:8px"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px">
        <button id="createProjectCancel" style="padding:10px 22px;background:#f2f4f4;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter;color:#2d3435">Cancel</button>
        <button id="createProjectSubmit" style="padding:10px 22px;background:linear-gradient(135deg,#526258,#46564c);color:#eafcef;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:Inter">Create &amp; Open</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/client/auth.js"></script>
<script src="/client/projects.js"></script>
</body>
</html>
